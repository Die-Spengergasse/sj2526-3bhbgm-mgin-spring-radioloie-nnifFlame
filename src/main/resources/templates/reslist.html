<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header-head('Reservierungsliste')}"></head>
<body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container pb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Geräte-Reservierungsplan</h2>
            <a th:href="@{/reservations/add}" class="btn btn-success text-white shadow-sm">
                <i class="bi bi-calendar-plus"></i> Neue Reservierung
            </a>
        </div>
        
        <div class="card mb-4 shadow-sm border-0">
            <div class="card-body bg-light">
                <form th:action="@{/reservations/list}" method="get" class="row align-items-center">
                    <div class="col-md-auto">
                        <label for="deviceId" class="form-label fw-bold mb-0">Untersuchungsgerät filtern:</label>
                    </div>
                    <div class="col-md-4">
                        <select name="deviceId" id="deviceId" class="form-select" onchange="this.form.submit()">
                            <option value="">-- Alle Geräte --</option>
                            <option th:each="d : ${devices}" 
                                    th:value="${d.id}" 
                                    th:text="${d.type + ' (' + d.id + ')'}"
                                    th:selected="${d.id == selectedDeviceId}"></option>
                        </select>
                    </div>
                </form>
            </div>
        </div>

        <div th:if="${reservations != null}" class="card shadow-sm border-0">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0">
                    <span th:if="${selectedDeviceId != null and !selectedDeviceId.isEmpty()}">
                        Reservierungen für: <span class="text-primary" th:text="${selectedDeviceId}"></span>
                    </span>
                    <span th:unless="${selectedDeviceId != null and !selectedDeviceId.isEmpty()}">
                        Alle aktuellen Reservierungen
                    </span>
                </h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="px-4 py-3">Zeitpunkt</th>
                                <th class="py-3">Patient</th>
                                <th class="py-3">Region</th>
                                <th class="py-3">Gerät</th>
                                <th class="py-3 px-4 text-end">Aktionen</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="res : ${reservations}">
                                <td class="px-4 py-3 align-middle fw-bold" th:text="${#temporals.format(res.reservationTime, 'dd.MM.yyyy HH:mm')}"></td>
                                <td class="py-3 align-middle" th:text="${res.patient.lastName + ' ' + res.patient.firstName}"></td>
                                <td class="py-3 align-middle">
                                    <span class="badge bg-secondary" th:text="${res.bodyRegion}"></span>
                                </td>
                                <td class="py-3 align-middle" th:text="${res.device.type}"></td>
                                <td class="py-3 px-4 text-end align-middle">
                                    <button class="btn btn-sm btn-outline-info" th:title="${res.comment}">Info</button>
                                </td>
                            </tr>
                            <tr th:if="${reservations.empty}">
                                <td colspan="5" class="text-center py-5 text-muted">Keine Reservierungen gefunden.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <a th:href="@{/}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Zurück zur Startseite
            </a>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
