<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header-head('Patientenliste')}"></head>
<body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container pb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Registrierte Patienten</h2>
            <a th:href="@{/patients/register}" class="btn btn-primary shadow-sm">
                <i class="bi bi-person-plus"></i> Neuer Patient
            </a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="px-4 py-3">SVN</th>
                                <th class="py-3">Name</th>
                                <th class="py-3">Geschlecht</th>
                                <th class="py-3">Geburtsdatum</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="p : ${patients}">
                                <td class="px-4 py-3 align-middle" th:text="${p.socialSecurityNumber}"></td>
                                <td class="py-3 align-middle fw-bold" th:text="${p.lastName + ', ' + p.firstName}"></td>
                                <td class="py-3 align-middle">
                                    <span class="badge rounded-pill bg-info text-dark" th:text="${p.gender}"></span>
                                </td>
                                <td class="py-3 align-middle" th:text="${#temporals.format(p.birthDate, 'dd.MM.yyyy')}"></td>
                            </tr>
                            <tr th:if="${patients.empty}">
                                <td colspan="4" class="text-center py-5 text-muted">Keine Patienten registriert.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <a th:href="@{/}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Zurück zur Startseite
            </a>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
